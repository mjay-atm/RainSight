name: Update Taoyuan 24h Rainfall Data

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: update-rainfall-data
  cancel-in-progress: false

# ---------------------------------------------------------------------------
# Required repository secrets:
#   SSH_HOST            - 伺服器 IP 或 hostname
#   SSH_USER            - SSH 登入帳號
#   SSH_PRIVATE_KEY     - 對應的 SSH 私鑰（PEM 格式）
#   REMOTE_PROJECT_PATH - 伺服器上的專案目錄，例如 /home/user/RainSight
#   REMOTE_WATCH_PATH   - 接收 24h moving 資料的目錄
# ---------------------------------------------------------------------------

jobs:
  # ---------- 有新 push 時：在伺服器同步最新程式碼 ----------
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest code on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd "${{ secrets.REMOTE_PROJECT_PATH }}"
            git pull --ff-only

  # ---------- 排程 / 手動觸發：runner 抓取資料後 rsync 傳回伺服器 ----------
  fetch-rainfall:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Taipei
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install requests

      - name: Generate rainfall json
        id: fetch
        run: |
          set -euo pipefail
          mkdir -p data

          IFS='|' read -r target_time stamp <<< "$(python3 -c "from datetime import datetime, timedelta; q=datetime.now()-timedelta(minutes=10); q=q.replace(minute=(q.minute//10)*10, second=0, microsecond=0); print(q.strftime('%Y-%m-%d %H:%M:%S') + '|' + q.strftime('%Y%m%d_%H%M'))")"

          output_file="data/taoyuan_rainfall_24h_${stamp}.json"

          python fetch_station_24h_rainfall.py \
            --time "$target_time" \
            --county "桃園市" \
            --output "$output_file"

          echo "output_file=$output_file" >> "$GITHUB_OUTPUT"
          echo "stamp=${stamp}" >> "$GITHUB_OUTPUT"
          echo "target_time=${target_time}" >> "$GITHUB_OUTPUT"

      - name: Generate 24h moving rainfall json
        id: fetch_moving
        run: |
          set -euo pipefail
          mkdir -p data

          moving_file="data/taoyuan_rainfall_24H_moving_${{ steps.fetch.outputs.stamp }}.json"

          python fetch_rain_24h_moving.py \
            --time "${{ steps.fetch.outputs.target_time }}" \
            --county "桃園市" \
            --output "$moving_file"

          echo "moving_file=$moving_file" >> "$GITHUB_OUTPUT"

      - name: Setup SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_ed25519
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Update manifest
        run: |
          python3 -c "
          import json, pathlib
          p = pathlib.Path('data/manifest.json')
          p.write_text(json.dumps({'latest_stamp': '${{ steps.fetch.outputs.stamp }}'}, ensure_ascii=False, indent=2), encoding='utf-8')
          "

      - name: Rsync json and manifest to server
        run: |
          rsync -az --mkpath \
            "${{ steps.fetch.outputs.output_file }}" \
            data/manifest.json \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.REMOTE_PROJECT_PATH }}/data/"

      - name: Rsync 24h moving json to watch server
        run: |
          rsync -az --mkpath \
            "${{ steps.fetch_moving.outputs.moving_file }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.REMOTE_WATCH_PATH }}/"
