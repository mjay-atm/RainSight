<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RainSight 測站地圖</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <!-- Add Turf.js for geometry operations -->
  <script src="https://unpkg.com/@turf/turf/turf.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>RainSight｜桃園市雨量與氣象測站地圖</h1>
    <div class="header-right">
      <div class="toolbar">
        <label for="districtFilter">行政區</label>
        <select id="districtFilter" aria-label="行政區篩選">
          <option value="ALL">全部</option>
        </select>
      </div>
      <div class="meta" id="meta">載入中...</div>
    </div>
  </header>
  <main class="app-layout">
    <aside class="rainfall-panel" aria-labelledby="rainfallPanelTitle">
      <section class="panel-section panel-intro">
        <p class="panel-kicker">過去 24 小時雨量統計</p>
        <h2 id="rainfallPanelTitle">雨量統計面板</h2>
        <div class="time-query">
          <label for="rainfallTimeInput">指定時間</label>
          <div class="time-query-controls">
            <input id="rainfallTimeInput" type="datetime-local" step="60" aria-label="指定雨量查詢時間" />
            <button id="rainfallTimeApply" type="button">載入</button>
          </div>
        </div>
        <p class="panel-description" id="rainfallPanelMeta">載入中...</p>
      </section>

      <section class="panel-section">
        <div class="panel-section-head">
          <div>
            <h3>各區代表測站</h3>
            <p class="panel-caption">各鄉鎮市區最大 24 小時累積雨量</p>
          </div>
        </div>
        <div id="districtRainfallSummary" class="district-summary-list loading-text">載入中...</div>
      </section>

      <section class="panel-section panel-section-fill">
        <div class="panel-section-head">
          <div>
            <h3>測站排行榜</h3>
            <p class="panel-caption" id="rankingCaption">依行政區篩選中...</p>
          </div>
        </div>
        <div id="rainfallRanking" class="ranking-list loading-text">載入中...</div>
      </section>
    </aside>

    <div id="map" aria-label="測站地圖"></div>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="script.js"></script>
  <script src="rainfall-panel.js"></script>
</body>
</html>
