<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RainSight 測站地圖</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <!-- Add Turf.js for geometry operations -->
  <script src="https://unpkg.com/@turf/turf/turf.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>RainSight｜桃園市雨量與氣象測站地圖</h1>
    <div class="header-right">
      <div class="toolbar">
        <label for="districtFilter">行政區</label>
        <select id="districtFilter" aria-label="行政區篩選">
          <option value="ALL">全部</option>
        </select>
      </div>
      <div class="meta" id="meta">載入中...</div>
    </div>
  </header>
  <div id="map" aria-label="測站地圖"></div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="script.js"></script>
</body>
</html>
